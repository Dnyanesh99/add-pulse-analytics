# =============================================================================
# AdPulse — Full Stack docker-compose.yml
# =============================================================================
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose up -d --build
# =============================================================================

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: adpulse-postgres
    <<: [*restart, *logging]
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_level=replica
        -c max_wal_size=1GB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=500
        -c log_connections=on
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: adpulse-redis
    <<: [*restart, *logging]
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 320M

  # ---------------------------------------------------------------------------
  # Apache Kafka (Official image, KRaft mode)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:latest
    container_name: adpulse-kafka
    <<: [*restart, *logging]
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      # KRaft identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Listeners
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      # Cluster ID for KRaft
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      
      # Stability & Defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      
      # Data directory (Official image default)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  kafka-init:
    image: apache/kafka:latest
    container_name: adpulse-kafka-init
    <<: *logging
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic ad-events --partitions 6 --replication-factor 1 && echo 'Topic ad-events ready.'"
    restart: "no"

  # ---------------------------------------------------------------------------
  # ClickHouse 23.8
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:25.3.10.19-alpine
    container_name: adpulse-clickhouse
    <<: [*restart, *logging]
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - clickhouse_data:/var/lib/clickhouse
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ---------------------------------------------------------------------------
  # Backend Services (Java / Spring Boot)
  # ---------------------------------------------------------------------------
  
  ingestion-api:
    build:
      context: ./services
      dockerfile: backend.Dockerfile
      args:
        SERVICE_NAME: ingestion
    container_name: adpulse-ingestion
    <<: [*restart, *logging]
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_URL: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-api:
    build:
      context: ./services
      dockerfile: backend.Dockerfile
      args:
        SERVICE_NAME: analytics
    container_name: adpulse-analytics
    <<: [*restart, *logging]
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      CLICKHOUSE_URL: jdbc:ch://clickhouse:8123/${CLICKHOUSE_DB}?compress=0
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy

  simulator:
    build:
      context: ./services
      dockerfile: backend.Dockerfile
      args:
        SERVICE_NAME: simulator
    container_name: adpulse-simulator
    <<: [*restart, *logging]
    environment:
      INGESTION_URL: http://adpulse-ingestion:8082/api/v1/events/track
      SIMULATOR_WORKERS: 10
      SIMULATOR_BATCH_DELAY_MS: 100
    depends_on:
      ingestion-api:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Frontend Service (React / Vite)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: adpulse-frontend
    <<: [*restart, *logging]
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      - analytics-api

  # ---------------------------------------------------------------------------
  # Automated E2E Testing (Cypress)
  # ---------------------------------------------------------------------------
  cypress:
    image: cypress/included:15.17.0
    container_name: adpulse-cypress
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      - CYPRESS_baseUrl=http://frontend:80
    volumes:
      - ./client:/app
    working_dir: /app
    restart: "no"

volumes:
  pg_data:
  redis_data:
  kafka_data:
  clickhouse_data:
