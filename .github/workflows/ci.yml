name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test Backend
        working-directory: ./services
        run: mvn clean verify -B

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack & Install
        working-directory: ./client
        run: |
          corepack enable
          yarn install --immutable

      - name: Lint
        working-directory: ./client
        run: yarn lint

      - name: Unit Tests
        working-directory: ./client
        run: yarn test:run

      - name: Build
        working-directory: ./client
        run: yarn build

  e2e-test:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack & Install Frontend Deps
        working-directory: ./client
        run: |
          corepack enable
          yarn install --immutable
          yarn cypress install

      - name: Start Docker Environment
        run: |
          cp .env.example .env
          docker compose up -d --build

      - name: Wait for Environment
        run: sleep 30

      - name: Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./client
          install: false
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120

      - name: Dump Docker Logs on Failure
        if: failure()
        run: docker compose logs
