spring:
  application:
    name: analytics
  
  # Primary Data Source: PostgreSQL (for JPA/Campaigns)
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/adpulse}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis for Campaign Sync
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ClickHouse Configuration (Custom)
clickhouse:
  url: ${CLICKHOUSE_URL:jdbc:ch://localhost:8123/adpulse}
  user: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}

server:
  port: ${SERVER_PORT:8081}
