spring:
  application:
    name: analytics
  
  # Primary Data Source: PostgreSQL (for JPA/Campaigns)
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/adpulse}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis for Campaign Sync
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    consumer:
      group-id: analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# ClickHouse Configuration (Custom)
clickhouse:
  url: ${CLICKHOUSE_URL:jdbc:ch://localhost:8123/adpulse}
  user: ${CLICKHOUSE_USER:default}
  password: ${CLICKHOUSE_PASSWORD:}

server:
  port: ${SERVER_PORT:8081}
